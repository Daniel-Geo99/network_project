<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NetTools</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Sora:wght@300;400;600&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0f14;
    --surface: #151820;
    --surface2: #1c2030;
    --border: #252a3a;
    --accent: #4f8ef7;
    --accent2: #3dd68c;
    --warn: #f7874f;
    --text: #e2e8f0;
    --muted: #64748b;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Sora', sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    padding: 0;
  }

  /* ── Header ── */
  header {
    padding: 1.5rem 2rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 1rem;
    background: var(--surface);
  }
  .logo {
    font-family: var(--mono);
    font-size: 1.2rem;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: -0.5px;
  }
  .logo span { color: var(--text); }
  .badge {
    font-family: var(--mono);
    font-size: 0.65rem;
    background: #1a2540;
    color: var(--accent);
    border: 1px solid var(--accent);
    border-radius: 4px;
    padding: 2px 8px;
    letter-spacing: 1px;
  }

  /* ── Layout ── */
  .container { max-width: 960px; margin: 0 auto; padding: 2rem; }

  /* ── Tabs ── */
  .tabs {
    display: flex;
    gap: 0;
    margin-bottom: 2rem;
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }
  .tab-btn {
    flex: 1;
    padding: 0.85rem 1rem;
    background: var(--surface);
    border: none;
    color: var(--muted);
    font-family: var(--sans);
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    border-right: 1px solid var(--border);
  }
  .tab-btn:last-child { border-right: none; }
  .tab-btn.active { background: var(--surface2); color: var(--accent); }
  .tab-btn:hover:not(.active) { color: var(--text); background: var(--surface2); }
  .tab-icon { margin-right: 6px; }

  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* ── Cards ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.75rem;
    margin-bottom: 1.5rem;
  }
  .card-title {
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 1.25rem;
  }

  /* ── Form elements ── */
  .input-row { display: flex; gap: 0.75rem; }
  input[type="text"] {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--mono);
    font-size: 0.9rem;
    padding: 0.75rem 1rem;
    border-radius: 8px;
    outline: none;
    transition: border-color 0.2s;
  }
  input[type="text"]:focus { border-color: var(--accent); }
  input[type="text"]::placeholder { color: var(--muted); }

  button {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 0.75rem 1.4rem;
    font-family: var(--sans);
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    white-space: nowrap;
  }
  button:hover { opacity: 0.88; }
  button:active { transform: scale(0.97); }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  button.secondary {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
  }
  button.danger { background: #c0392b; }

  /* ── Drop zone ── */
  .drop-zone {
    border: 2px dashed var(--border);
    border-radius: 10px;
    padding: 2.5rem;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    margin-bottom: 1rem;
  }
  .drop-zone:hover, .drop-zone.dragover {
    border-color: var(--accent);
    background: #151d30;
  }
  .drop-zone input { display: none; }
  .drop-icon { font-size: 2rem; margin-bottom: 0.5rem; }
  .drop-text { color: var(--muted); font-size: 0.9rem; }
  .drop-text strong { color: var(--accent); }

  /* ── File list ── */
  .file-list { display: flex; flex-direction: column; gap: 0.5rem; }
  .file-item {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.75rem 1rem;
    font-size: 0.85rem;
  }
  .file-item .file-name {
    flex: 1;
    font-family: var(--mono);
    color: var(--text);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .file-item .file-size { color: var(--muted); font-size: 0.75rem; white-space: nowrap; }
  .file-item a {
    color: var(--accent2);
    text-decoration: none;
    font-size: 0.8rem;
    font-weight: 600;
  }
  .file-item a:hover { text-decoration: underline; }
  .file-item .del-btn {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 1rem;
    padding: 0 4px;
    transition: color 0.2s;
  }
  .file-item .del-btn:hover { color: #e74c3c; }

  /* ── DNS results ── */
  .dns-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 1rem;
    margin-top: 1rem;
  }
  .dns-record {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1rem;
  }
  .dns-record-type {
    font-family: var(--mono);
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 1px;
    color: var(--accent);
    margin-bottom: 0.5rem;
  }
  .dns-record-values { font-family: var(--mono); font-size: 0.8rem; color: var(--text); }
  .dns-record-values .val { padding: 2px 0; color: var(--muted); }
  .dns-record-values .val.found { color: var(--text); }
  .resolved-ip {
    display: inline-block;
    background: #1a2e1a;
    border: 1px solid var(--accent2);
    color: var(--accent2);
    font-family: var(--mono);
    font-size: 0.85rem;
    padding: 0.4rem 0.9rem;
    border-radius: 6px;
    margin-bottom: 1rem;
  }

  /* ── Traceroute table ── */
  .trace-table { width: 100%; border-collapse: collapse; font-family: var(--mono); font-size: 0.82rem; margin-top: 1rem; }
  .trace-table th {
    text-align: left;
    padding: 0.5rem 0.75rem;
    color: var(--muted);
    font-size: 0.7rem;
    letter-spacing: 1px;
    text-transform: uppercase;
    border-bottom: 1px solid var(--border);
  }
  .trace-table td { padding: 0.55rem 0.75rem; border-bottom: 1px solid #1a1f2e; }
  .trace-table tr:hover td { background: var(--surface2); }
  .hop-num { color: var(--muted); }
  .hop-ip { color: var(--accent); }
  .hop-time { color: var(--accent2); }
  .hop-star { color: var(--muted); }

  /* ── Toast / status ── */
  .status {
    font-size: 0.82rem;
    padding: 0.6rem 1rem;
    border-radius: 6px;
    margin-top: 0.75rem;
    display: none;
    font-family: var(--mono);
  }
  .status.ok { background: #1a2e1a; color: var(--accent2); display: block; }
  .status.err { background: #2e1a1a; color: #e74c3c; display: block; }
  .status.info { background: #1a2040; color: var(--accent); display: block; }

  /* ── Spinner ── */
  .spinner {
    display: inline-block;
    width: 14px; height: 14px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .empty-state { text-align: center; color: var(--muted); padding: 2rem; font-size: 0.9rem; }

  /* ── Progress bar ── */
  .progress-wrap {
    height: 4px;
    background: var(--surface2);
    border-radius: 2px;
    margin-top: 0.75rem;
    overflow: hidden;
    display: none;
  }
  .progress-bar {
    height: 100%;
    background: var(--accent);
    width: 0%;
    transition: width 0.3s;
    border-radius: 2px;
  }
  .progress-wrap.show { display: block; }
</style>
</head>
<body>

<header>
  <div class="logo">net<span>tools</span></div>
  <div class="badge">NETWORKING PROJECT</div>
</header>

<div class="container">

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('transfer')">
      <span class="tab-icon">📁</span>File Transfer
    </button>
    <button class="tab-btn" onclick="switchTab('dns')">
      <span class="tab-icon">🌐</span>DNS Lookup
    </button>
    <button class="tab-btn" onclick="switchTab('trace')">
      <span class="tab-icon">🛰️</span>Traceroute
    </button>
  </div>

  <!-- ── FILE TRANSFER ── -->
  <div id="tab-transfer" class="tab-panel active">

    <div class="card">
      <div class="card-title">Upload a File</div>
      <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
        <input type="file" id="fileInput" onchange="handleFileSelect(this.files[0])"/>
        <div class="drop-icon">⬆️</div>
        <div class="drop-text"><strong>Click to browse</strong> or drag & drop a file here</div>
      </div>
      <div class="progress-wrap" id="progressWrap">
        <div class="progress-bar" id="progressBar"></div>
      </div>
      <div class="status" id="uploadStatus"></div>
    </div>

    <div class="card">
      <div class="card-title" style="display:flex;justify-content:space-between;align-items:center;">
        <span>Files on Server</span>
        <button class="secondary" style="font-size:0.75rem;padding:0.4rem 0.8rem;" onclick="loadFiles()">↺ Refresh</button>
      </div>
      <div class="file-list" id="fileList">
        <div class="empty-state">No files uploaded yet.</div>
      </div>
    </div>

  </div>

  <!-- ── DNS LOOKUP ── -->
  <div id="tab-dns" class="tab-panel">
    <div class="card">
      <div class="card-title">DNS Record Lookup</div>
      <div class="input-row">
        <input type="text" id="dnsInput" placeholder="e.g. google.com" onkeydown="if(event.key==='Enter')dnsLookup()"/>
        <button onclick="dnsLookup()" id="dnsBtn">Look Up</button>
      </div>
      <div class="status" id="dnsStatus"></div>
    </div>

    <div id="dnsResults" style="display:none;">
      <div class="card">
        <div class="card-title">Results</div>
        <div id="resolvedIp"></div>
        <div class="dns-grid" id="dnsGrid"></div>
      </div>
    </div>
  </div>

  <!-- ── TRACEROUTE ── -->
  <div id="tab-trace" class="tab-panel">
    <div class="card">
      <div class="card-title">Traceroute</div>
      <div class="input-row">
        <input type="text" id="traceInput" placeholder="e.g. github.com" onkeydown="if(event.key==='Enter')runTrace()"/>
        <button onclick="runTrace()" id="traceBtn">Trace</button>
      </div>
      <div class="status" id="traceStatus"></div>
    </div>

    <div id="traceResults" style="display:none;">
      <div class="card">
        <div class="card-title">Hops</div>
        <table class="trace-table">
          <thead>
            <tr>
              <th>#</th><th>IP Address</th><th>RTT</th>
            </tr>
          </thead>
          <tbody id="traceBody"></tbody>
        </table>
      </div>
    </div>
  </div>

</div><!-- /container -->

<script>
// ── Tab switching ──────────────────────────────────────────────────────────
function switchTab(name) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  event.currentTarget.classList.add('active');
}

// ── File Transfer ──────────────────────────────────────────────────────────
const dropZone = document.getElementById('dropZone');

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('dragover');
  if (e.dataTransfer.files[0]) handleFileSelect(e.dataTransfer.files[0]);
});

function setStatus(id, msg, type) {
  const el = document.getElementById(id);
  el.className = 'status ' + type;
  el.innerHTML = msg;
}

function formatSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / (1024 * 1024)).toFixed(2) + ' MB';
}

async function handleFileSelect(file) {
  if (!file) return;
  const progressWrap = document.getElementById('progressWrap');
  const progressBar = document.getElementById('progressBar');
  progressWrap.classList.add('show');
  progressBar.style.width = '0%';
  setStatus('uploadStatus', `<span class="spinner"></span>Uploading ${file.name}…`, 'info');

  const formData = new FormData();
  formData.append('file', file);

  // Simulate progress
  let pct = 0;
  const iv = setInterval(() => {
    pct = Math.min(pct + Math.random() * 20, 90);
    progressBar.style.width = pct + '%';
  }, 200);

  try {
    const res = await fetch('/upload', { method: 'POST', body: formData });
    const data = await res.json();
    clearInterval(iv);
    progressBar.style.width = '100%';
    if (res.ok) {
      setStatus('uploadStatus', `✓ Uploaded — ${data.original_name} (${formatSize(data.size_bytes)})`, 'ok');
      loadFiles();
    } else {
      setStatus('uploadStatus', '✗ ' + data.error, 'err');
    }
  } catch (e) {
    clearInterval(iv);
    setStatus('uploadStatus', '✗ Upload failed: ' + e.message, 'err');
  }
  setTimeout(() => progressWrap.classList.remove('show'), 1500);
}

async function loadFiles() {
  const list = document.getElementById('fileList');
  list.innerHTML = '<div class="empty-state"><span class="spinner"></span>Loading…</div>';
  try {
    const res = await fetch('/files');
    const files = await res.json();
    if (files.length === 0) {
      list.innerHTML = '<div class="empty-state">No files uploaded yet.</div>';
      return;
    }
    list.innerHTML = '';
    files.forEach(f => {
      const el = document.createElement('div');
      el.className = 'file-item';
      el.innerHTML = `
        <span class="file-name">${f.name}</span>
        <span class="file-size">${formatSize(f.size_bytes)}</span>
        <a href="${f.download_url}" download>⬇ Download</a>
        <button class="del-btn" onclick="deleteFile('${f.name}', this)" title="Delete">✕</button>
      `;
      list.appendChild(el);
    });
  } catch (e) {
    list.innerHTML = '<div class="empty-state" style="color:#e74c3c">Failed to load files.</div>';
  }
}

async function deleteFile(name, btn) {
  btn.disabled = true;
  try {
    await fetch('/delete/' + name, { method: 'DELETE' });
    loadFiles();
  } catch {}
}

// ── DNS Lookup ─────────────────────────────────────────────────────────────
const DNS_COLORS = {
  A:'#4f8ef7', AAAA:'#9b59b6', MX:'#e67e22',
  NS:'#2ecc71', TXT:'#e74c3c', CNAME:'#1abc9c'
};

async function dnsLookup() {
  const domain = document.getElementById('dnsInput').value.trim();
  if (!domain) return;
  const btn = document.getElementById('dnsBtn');
  btn.disabled = true;
  setStatus('dnsStatus', `<span class="spinner"></span>Looking up ${domain}…`, 'info');
  document.getElementById('dnsResults').style.display = 'none';

  try {
    const res = await fetch('/dns', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({domain})
    });
    const data = await res.json();
    if (!res.ok) { setStatus('dnsStatus', '✗ ' + data.error, 'err'); return; }

    setStatus('dnsStatus', `✓ Records found for ${domain}`, 'ok');
    document.getElementById('resolvedIp').innerHTML =
      `<div class="resolved-ip">🌐 ${data.records.resolved_ip}</div>`;

    const grid = document.getElementById('dnsGrid');
    grid.innerHTML = '';
    const types = ['A','AAAA','MX','NS','TXT','CNAME'];
    types.forEach(t => {
      const vals = data.records[t] || [];
      const div = document.createElement('div');
      div.className = 'dns-record';
      div.innerHTML = `
        <div class="dns-record-type" style="color:${DNS_COLORS[t]||'#4f8ef7'}">${t} Records</div>
        <div class="dns-record-values">
          ${vals.length ? vals.map(v=>`<div class="val found">${v}</div>`).join('') : '<div class="val">— none —</div>'}
        </div>
      `;
      grid.appendChild(div);
    });

    document.getElementById('dnsResults').style.display = 'block';
  } catch (e) {
    setStatus('dnsStatus', '✗ Error: ' + e.message, 'err');
  } finally { btn.disabled = false; }
}

// ── Traceroute ─────────────────────────────────────────────────────────────
async function runTrace() {
  const domain = document.getElementById('traceInput').value.trim();
  if (!domain) return;
  const btn = document.getElementById('traceBtn');
  btn.disabled = true;
  setStatus('traceStatus', `<span class="spinner"></span>Tracing route to ${domain} (up to 15 hops)…`, 'info');
  document.getElementById('traceResults').style.display = 'none';

  try {
    const res = await fetch('/traceroute', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({domain})
    });
    const data = await res.json();
    if (!res.ok) { setStatus('traceStatus', '✗ ' + data.error, 'err'); return; }

    const hops = data.hops;
    if (!hops.length) {
      setStatus('traceStatus', '⚠ No hops returned. Try another domain.', 'err');
      return;
    }

    setStatus('traceStatus', `✓ ${hops.length} hops to ${domain}`, 'ok');
    const tbody = document.getElementById('traceBody');
    tbody.innerHTML = '';
    hops.forEach(h => {
      const tr = document.createElement('tr');
      const ip = h.ip === '*' ? '<span class="hop-star">* * *</span>' : `<span class="hop-ip">${h.ip}</span>`;
      const times = h.times.map(t => `<span class="hop-time">${t}</span>`).join(' &nbsp;');
      tr.innerHTML = `<td class="hop-num">${h.hop}</td><td>${ip}</td><td>${times}</td>`;
      tbody.appendChild(tr);
    });
    document.getElementById('traceResults').style.display = 'block';
  } catch (e) {
    setStatus('traceStatus', '✗ Error: ' + e.message, 'err');
  } finally { btn.disabled = false; }
}

// ── Init ───────────────────────────────────────────────────────────────────
loadFiles();
</script>
</body>
</html>
